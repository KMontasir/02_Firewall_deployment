#cloud-config
hostname: "firewall-template"

users:
  - name: admin
    gecos: "Admin User"
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/sh
    lock-passwd: false
    passwd: "$6$b9T6gEnQwVvxM5gV$MIecEzUmOUeJFs4Z/BCKDcbowu0s/0qgVFqLoL3ZEYs18ik6JFBsBXZsXKiu.UuLEKd9VlttjkUh/XSpj90d6/"  # Password --> opnsense

# cloud-init configuration pour FreeBSD avec installation d'OPNsense
runcmd:
  # Configuration réseau pour vtnet0
  - "echo 'ifconfig_vtnet0=\"inet 192.168.1.141 netmask 255.255.255.0\"' >> /etc/rc.conf"
  - "echo 'defaultrouter=\"192.168.1.254\"' >> /etc/rc.conf"
  - "echo 'nameserver 192.168.1.254' > /etc/resolv.conf"

  # Redémarrer les services réseau pour appliquer la configuration
  - "service netif restart"
  - "service routing restart"

  # Mise à jour des paquets
  - "pkg update -f"

  # Télécharger le script d'installation OPNsense
  - "fetch https://raw.githubusercontent.com/opnsense/update/master/src/bootstrap/opnsense-bootstrap.sh.in -o /root/opnsense-bootstrap.sh.in"
  - "chmod +x /root/opnsense-bootstrap.sh.in"
  
  # Écrire un script pour exécuter le bootstrap au redémarrage
  - "echo '#!/bin/sh' > /etc/rc.local"
  - "echo 'nohup sh /tmp/opnsense-bootstrap.sh.in -r 25.1 > /tmp/bootstrap.log 2>&1 &' >> /etc/rc.local"
  - "echo 'sleep 300' >> /etc/rc.local"
  - "echo 'rm -f /etc/rc.local' >> /etc/rc.local"
  - "chmod +x /etc/rc.local"

  # Redémarrer pour appliquer et lancer l'installation au boot
  - "reboot"

