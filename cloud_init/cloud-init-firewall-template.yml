#cloud-config
hostname: "firewall-template"

users:
  - name: admin
    gecos: "Admin User"
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/sh
    lock-passwd: false
    passwd: "$6$b9T6gEnQwVvxM5gV$MIecEzUmOUeJFs4Z/BCKDcbowu0s/0qgVFqLoL3ZEYs18ik6JFBsBXZsXKiu.UuLEKd9VlttjkUh/XSpj90d6/"  # Password --> opnsense

runcmd:
  # Configuration réseau manuelle pour vtnet0
  - "echo 'ifconfig_vtnet0=\"inet 192.168.1.141 netmask 255.255.255.0\"' >> /etc/rc.conf"
  - "echo 'defaultrouter=\"192.168.1.254\"' >> /etc/rc.conf"
  - "echo 'nameserver 192.168.1.254' > /etc/resolv.conf"

  # Redémarrer les services réseau
  - "service netif restart"
  - "service routing restart"
  
  # Vérification réseau
  - "ping -c 3 google.com"

  # Télécharger et stocker le script d’installation
  - "fetch -o /usr/local/etc/opnsense-bootstrap.sh https://raw.githubusercontent.com/opnsense/update/master/src/bootstrap/opnsense-bootstrap.sh.in"
  - "chmod +x /usr/local/etc/opnsense-bootstrap.sh"

  # Ajouter l'exécution au prochain boot via /etc/rc.local
  - "echo '#!/bin/sh' > /etc/rc.local"
  - "echo 'if [ ! -f /var/log/opnsense_installed ]; then' >> /etc/rc.local"
  - "echo '  nohup sh /usr/local/etc/opnsense-bootstrap.sh -r 25.1 > /var/log/bootstrap.log 2>&1' >> /etc/rc.local"
  - "echo '  touch /var/log/opnsense_installed' >> /etc/rc.local"
  - "echo '  reboot' >> /etc/rc.local"
  - "echo 'fi' >> /etc/rc.local"
  - "chmod +x /etc/rc.local"

  # Premier redémarrage pour exécuter l’installation au prochain boot
  - "reboot"
